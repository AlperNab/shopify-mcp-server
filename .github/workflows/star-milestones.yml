name: Star Milestones

on:
  watch:
    types: [started]

jobs:
  celebrate:
    runs-on: ubuntu-latest
    steps:
      - name: Get star count
        id: stars
        uses: actions/github-script@v7
        with:
          script: |
            const repo = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            return repo.data.stargazers_count;
          result-encoding: string

      - name: Check milestone and celebrate
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const count = parseInt('${{ steps.stars.outputs.result }}');
            const milestones = [100, 500, 1000, 2500, 5000, 10000];
            
            if (!milestones.includes(count)) return;
            
            const messages = {
              100:   { emoji: '🎉', title: `${count} Stars!`, body: `We just hit **${count} stars** — thank you to everyone who starred, shared, and used this project. Your support keeps it going.\n\nGot feedback or ideas? Drop them in the [Discussions](../../discussions) tab. 🚀` },
              500:   { emoji: '🚀', title: `${count} Stars — we're just getting started`, body: `**${count} stars!** 🚀\n\nThis project is clearly solving a real problem. Thank you all.\n\nComing up next:\n- [ ] More tools based on your issues\n- [ ] Better docs\n- [ ] Performance improvements\n\nKeep the feedback coming!` },
              1000:  { emoji: '⭐', title: `1,000 Stars — this is real`, body: `**1,000 stars.** 🌟\n\nWhen I started this, I wasn't sure anyone needed it. You've shown me they do.\n\nWhat's next: I'm working on the features most requested in issues. If yours isn't on the list yet, comment below.\n\nThank you. Genuinely.` },
              2500:  { emoji: '🔥', title: `2,500 Stars`, body: `**2,500 stars!** 🔥\n\nThis project has grown beyond what I imagined. Thank you to every contributor, issue reporter, and person who spread the word.\n\nIf you're using this in production, I'd love to know. Comment below or open a PR to add yourself to the [Users list](../../wiki).` },
              5000:  { emoji: '💥', title: `5,000 Stars — milestone unlocked`, body: `**5,000 stars.** 💥\n\nWe made it to a major milestone. This wouldn't exist without the community around it.\n\nI'm applying to the [Claude for OSS program](https://claude.com/contact-sales/claude-for-oss) with this. Thank you for making it possible.` },
              10000: { emoji: '🏆', title: `10,000 Stars`, body: `**10,000 stars!** 🏆\n\nThis is beyond anything I imagined when I shipped the first commit. Thank you.\n\nStill open source. Still MIT. Still maintained. Let's keep building.` },
            };
            
            const m = messages[count];
            if (!m) return;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `${m.emoji} ${m.title}`,
              body: m.body,
              labels: ['milestone', 'community'],
            });
